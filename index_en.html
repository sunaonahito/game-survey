    // --- Shuffle utilities ---
    function shuffleArray(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getShuffledItems(key, items) {
      try {
        const saved = localStorage.getItem(key);
        if (saved) {
          const order = JSON.parse(saved);
          if (Array.isArray(order) && order.length === items.length) {
            return order.map(i => items[i]);
          }
        }
        const indices = shuffleArray(items.map((_, i) => i));
        localStorage.setItem(key, JSON.stringify(indices));
        return indices.map(i => items[i]);
      } catch (e) {
        return shuffleArray(items);
      }
    }

    // --- Send to Google Sheets ---
    async function sendToSheets(type, answers, ts) {
      if (!GAS_URL) return { skipped: true };
      try {
        await fetch(GAS_URL, { method: "POST", mode: "no-cors", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ type, answers, timestamp: ts }), redirect: "follow" });
        return { success: true };
      } catch (e) { console.error("Transmission Error:", e); return { success: false, error: e.message }; }
    }

    // --- Components ---
    function Bar({ cur, tot }) {
      const pct = Math.round(cur / tot * 100);
      return <div style={{ position: "sticky", top: 0, zIndex: 100, background: P.bgSolid, padding: "12px 0 8px", borderBottom: `1px solid ${P.bdr}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6, fontSize: 13, color: P.mut }}><span>Response Progress</span><span>{pct}%</span></div>
        <div style={{ height: 6, background: P.bdr, borderRadius: 3, overflow: "hidden" }}><div style={{ height: "100%", width: `${pct}%`, background: `linear-gradient(90deg,${P.pri},${P.priL})`, borderRadius: 3, transition: "width 0.4s ease" }} /></div>
      </div>;
    }

    function SQ({ item, scale, value, onChange, displayNum }) {
      const n = scale.max - scale.min + 1;
      const vals = Array.from({ length: n }, (_, i) => scale.min + i);
      const lFirst = scale.labels[0]; const lLast = scale.labels[n - 1];
      return <div style={{ padding: "20px 0", borderBottom: `1px solid ${P.bdr}` }}>
        <p style={{ margin: "0 0 14px", fontSize: 15, color: P.txt, lineHeight: 1.7 }}><span style={{ color: P.acc, fontWeight: 600, marginRight: 8, fontSize: 13 }}>{displayNum}.</span>{item.t}</p>
        <div style={{ maxWidth: Math.min(n * 56, 620) }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            {vals.map((v, i) => {
              const sel = value === v; return <div key={v} style={{ display: "flex", flexDirection: "column", alignItems: "center", flex: "1 1 0", minWidth: 0 }}>

                  onMouseEnter={e => { if (!sel) { e.target.style.borderColor = P.priL; e.target.style.background = P.selBg } }} onMouseLeave={e => { if (!sel) { e.target.style.borderColor = "rgba(255,255,255,0.2)"; e.target.style.background = "transparent" } }}>{v}</button>
              </div>
            })}

          {(lFirst || lLast) && <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6 }}>
            <span style={{ fontSize: 10, color: P.mut, lineHeight: 1.3 }}>{lFirst}</span>
            <span style={{ fontSize: 10, color: P.mut, lineHeight: 1.3, textAlign: "right" }}>{lLast}</span>
          </div>}
        </div>
      </div>;
    }

    function SS({ section, storageKey, answers, set }) {
      const [items] = useState(() => getShuffledItems(storageKey, section.items));
      return <div style={{ marginBottom: 32 }}>
        <div style={{ background: "linear-gradient(90deg,#1E3A6E,#2B5EA7)", color: "#fff", padding: "16px 24px", borderRadius: "10px 10px 0 0", fontFamily: "'Noto Serif JP',serif" }}><h2 style={{ margin: 0, fontSize: 17, fontWeight: 600 }}>{section.title}</h2></div>

        </div>
      </div>;
    }

    function CodeGen({ value, onChange, isPost }) {
      const BLOOD = [{ v: "1", l: "Type A" }, { v: "2", l: "Type B" }, { v: "3", l: "Type O" }, { v: "4", l: "Type AB" }, { v: "5", l: "Unknown" }];
      const ROWS = [{ v: "1", l: "A-row (A, I, U, E, O)" }, { v: "2", l: "K-row (K, G)" }, { v: "3", l: "S-row (S, Z)" }, { v: "4", l: "T-row (T, D, Ch)" }, { v: "5", l: "N-row (N)" }, { v: "6", l: "H-row (H, B, P, F)" }, { v: "7", l: "M-row (M)" }, { v: "8", l: "Y-row (Y)" }, { v: "9", l: "R-row (R)" }, { v: "0", l: "W-row (W)" }];
      const parse = (v) => {
        if (v && v.length >= 7) {
          const mm = parseInt(v.substring(0, 2), 10);
          const dd = parseInt(v.substring(2, 4), 10);
          const bl = v.substring(4, 5);
          const fr = v.substring(5, 6);
          const gr = v.substring(6, 7);
          if (!isNaN(mm) && !isNaN(dd) && mm >= 1 && mm <= 12 && dd >= 1 && dd <= 31
            && BLOOD.some(o => o.v === bl) && ROWS.some(o => o.v === fr) && ROWS.some(o => o.v === gr))
            return { month: mm.toString(), day: dd.toString(), bl, fr, gr };
        }
        return { month: "", day: "", bl: "", fr: "", gr: "" };
      };
      const p = parse(value);
      const [month, setMonth] = useState(p.month);
      const [day, setDay] = useState(p.day);
      const [bl, setBl] = useState(p.bl);
      const [fr, setFr] = useState(p.fr);
      const [gr, setGr] = useState(p.gr);
      const [autoLoaded, setAutoLoaded] = useState(false);
      useEffect(() => { if (isPost && !value) { try { const saved = localStorage.getItem("survey_anon_code"); if (saved) { const p2 = parse(saved); if (p2.month) { setMonth(p2.month); setDay(p2.day); setBl(p2.bl); setFr(p2.fr); setGr(p2.gr); onChange(saved); setAutoLoaded(true) } } } catch (e) { } } }, []);

      const build = (m, d, b, f, g) => (m && d && b && f && g) ? m.padStart(2, "0") + d.padStart(2, "0") + b + f + g : "";
      const cur = () => build(month, day, bl, fr, gr);

      const onM = (m) => { setMonth(m); onChange(build(m, day, bl, fr, gr)); };
      const onD = (d) => { setDay(d); onChange(build(month, d, bl, fr, gr)); };
      const onB = (b) => { setBl(b); onChange(build(month, day, b, fr, gr)); };
      const onF = (f) => { setFr(f); onChange(build(month, day, bl, f, gr)); };
      const onG = (g) => { setGr(g); onChange(build(month, day, bl, fr, g)); };

      const code = cur();
      const filled = [month, day, bl, fr, gr].filter(Boolean).length;
      const sel = { width: "100%", padding: "10px 14px", border: `1.5px solid ${P.bdr}`, borderRadius: 8, fontSize: 15, fontFamily: "'Noto Sans JP',sans-serif", background: "rgba(255,255,255,0.08)", color: P.txt, outline: "none", cursor: "pointer" };

      const seg = (txt, active) => <span style={{ color: active ? P.priL : "rgba(255,255,255,0.25)", transition: "color 0.2s" }}>{txt}</span>;

      return <div>

        <p style={{ fontSize: 13, color: P.mut, marginBottom: 16, lineHeight: 1.7 }}>Select the 5 items below to generate your 7-character anonymous code.</p>

              onFocus={e => e.target.style.borderColor = P.pri} onBlur={e => e.target.style.borderColor = P.bdr}>

              {Array.from({ length: 31 }, (_, i) => i + 1).map(d => <option key={d} value={d}>{d}</option>)}
            </select>
          </div>
          <div style={{ flex: "1 1 110px", minWidth: 110 }}>
            <label style={{ display: "block", fontSize: 12, color: P.mut, marginBottom: 6 }}>Blood Type</label>
            <select value={bl} onChange={e => onB(e.target.value)} style={sel}
              onFocus={e => e.target.style.borderColor = P.pri} onBlur={e => e.target.style.borderColor = P.bdr}>

            <label style={{ display: "block", fontSize: 12, color: P.mut, marginBottom: 6 }}>Initial of First Name</label>
            <select value={gr} onChange={e => onG(e.target.value)} style={sel}

              {code
                ? <p style={{ fontSize: 12, color: P.mut, margin: 0, lineHeight: 1.7 }}>{isPost ? "Please verify that this code matches the one from the pre-experience survey." : <span>This code will be required during the game play and the post-experience survey.<br />Please make a note of it.</span>}</p>
                : <p style={{ fontSize: 12, color: P.mut, margin: 0, lineHeight: 1.7 }}>Select <strong style={{ color: P.acc }}>{5 - filled}</strong> more items to complete your code.</p>

          </div>

      </div>;
    }

    function DQ({ q, value, onChange, ov, onOv, displayNum }) {
      const label = displayNum ? `${displayNum}.` : q.id.toUpperCase();
      const fs = { width: "100%", padding: "10px 14px", border: `1.5px solid ${P.bdr}`, borderRadius: 8, fontSize: 15, fontFamily: "'Noto Sans JP',sans-serif", background: "rgba(255,255,255,0.08)", color: P.txt, outline: "none", boxSizing: "border-box", transition: "border-color 0.2s" };
      if (q.type === "code") return <div style={{ marginBottom: 24 }}>
        <label style={{ display: "block", fontSize: 15, color: P.txt, marginBottom: 12, lineHeight: 1.7, fontWeight: 500 }}>{q.label}</label>
        <CodeGen value={value} onChange={onChange} isPost={q.isPost} />
      </div>;
      if (q.type === "text" || q.type === "number") return <div style={{ marginBottom: 24 }}>
        <label style={{ display: "block", fontSize: 15, color: P.txt, marginBottom: 8, lineHeight: 1.7 }}><span style={{ color: P.acc, fontWeight: 600, marginRight: 8, fontSize: 13 }}>{label}</span>{q.label}</label>
        {q.hint && <p style={{ fontSize: 12, color: P.mut, margin: "-4px 0 8px" }}>{q.hint}</p>}
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <input type={q.type === "number" ? "number" : "text"} value={value || ""} onChange={e => onChange(e.target.value)} placeholder={q.ph} style={{ ...fs, maxWidth: q.type === "number" ? 120 : 300 }} onFocus={e => e.target.style.borderColor = P.pri} onBlur={e => e.target.style.borderColor = P.bdr} />
          {q.suf && <span style={{ fontSize: 15, color: P.mut }}>{q.suf}</span>}
        </div>
      </div>;
      if (q.type === "textarea") return <div style={{ marginBottom: 24 }}>
        <label style={{ display: "block", fontSize: 15, color: P.txt, marginBottom: 8, lineHeight: 1.7 }}><span style={{ color: P.acc, fontWeight: 600, marginRight: 8, fontSize: 13 }}>{label}</span>{q.label}</label>
        <textarea value={value || ""} onChange={e => onChange(e.target.value)} placeholder={q.ph} rows={5} style={{ ...fs, resize: "vertical", minHeight: 100 }} onFocus={e => e.target.style.borderColor = P.pri} onBlur={e => e.target.style.borderColor = P.bdr} />
      </div>;
      if (q.type === "radio") return <div style={{ marginBottom: 24 }}>
        <p style={{ fontSize: 15, color: P.txt, marginBottom: 10, lineHeight: 1.7 }}><span style={{ color: P.acc, fontWeight: 600, marginRight: 8, fontSize: 13 }}>{label}</span>{q.label}</p>
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {q.opts.map((o, i) => {
            const s = value === o; return <label key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 14px", borderRadius: 8, cursor: "pointer", transition: "all 0.15s", background: s ? P.selBg : "transparent", border: `1.5px solid ${s ? P.pri : "transparent"}`, fontSize: 14 }}>
              <div style={{ width: 18, height: 18, borderRadius: "50%", border: `2px solid ${s ? P.pri : P.bdr}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{s && <div style={{ width: 10, height: 10, borderRadius: "50%", background: P.pri }} />}</div>
              <span style={{ color: P.txt }}>{o}</span><input type="radio" name={q.id} checked={s} onChange={() => onChange(o)} style={{ display: "none" }} />
            </label>
          })}
          {q.hasOther && value === q.opts[q.otherIdx] && <input type="text" value={ov || ""} onChange={e => onOv(e.target.value)} placeholder="Please specify." style={{ ...fs, maxWidth: 300, marginLeft: 42 }} onFocus={e => e.target.style.borderColor = P.pri} onBlur={e => e.target.style.borderColor = P.bdr} />}
        </div>
      </div>;
      if (q.type === "checkbox") {
        const sel = value || []; return <div style={{ marginBottom: 24 }}>
          <p style={{ fontSize: 15, color: P.txt, marginBottom: 10, lineHeight: 1.7 }}><span style={{ color: P.acc, fontWeight: 600, marginRight: 8, fontSize: 13 }}>{q.id.toUpperCase()}</span>{q.label}</p>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {q.opts.map((o, i) => {
              const c = sel.includes(o); return <label key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 14px", borderRadius: 8, cursor: "pointer", transition: "all 0.15s", background: c ? P.selBg : "transparent", border: `1.5px solid ${c ? P.pri : "transparent"}`, fontSize: 14 }}>
                <div style={{ width: 18, height: 18, borderRadius: 4, border: `2px solid ${c ? P.pri : P.bdr}`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, background: c ? P.pri : "transparent" }}>{c && <svg width="12" height="12" viewBox="0 0 12 12"><path d="M2 6l3 3 5-5" stroke="#fff" strokeWidth="2" fill="none" /></svg>}</div>
                <span style={{ color: P.txt }}>{o}</span><input type="checkbox" checked={c} onChange={() => { const nx = c ? sel.filter(s => s !== o) : [...sel, o]; onChange(nx) }} style={{ display: "none" }} />
              </label>
            })}
            {q.hasOther && sel.includes(q.opts[q.otherIdx]) && <input type="text" value={ov || ""} onChange={e => onOv(e.target.value)} placeholder="Please specify." style={{ ...fs, maxWidth: 300, marginLeft: 42 }} onFocus={e => e.target.style.borderColor = P.pri} onBlur={e => e.target.style.borderColor = P.bdr} />}
          </div>
        </div>;
      }
      return null;
    }

        const m = miss();

        <div style={{ position: "absolute", top: 24, right: 24, display: "flex", gap: 6, fontSize: 13, background: "rgba(255,255,255,0.06)", padding: "6px 14px", borderRadius: 20, border: `1.5px solid ${P.bdr}`, zIndex: 10 }}>

        </div>

          <div style={{ textAlign: "center", marginBottom: 36 }}>
            <div style={{ width: 64, height: 64, borderRadius: "50%", background: "linear-gradient(135deg,#2B5EA7,#5B8AF0)", margin: "0 auto 20px", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2"><path d="M9 11l3 3L22 4" /><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" /></svg>
            </div>
            <h1 style={{ fontFamily: "'Noto Serif JP',serif", fontSize: 24, color: "#FFFFFF", marginBottom: 16, fontWeight: 700, lineHeight: 1.5 }}>Please cooperate with our survey<br />on the game experience.</h1>

          <div style={{ textAlign: "center", padding: "60px 24px" }}>
            <div style={{ fontSize: 48, marginBottom: 16, color: "#4CAF50" }}>✓</div>
            <h2 style={{ fontFamily: "'Noto Serif JP',serif", fontSize: 22, color: P.pri, marginBottom: 12 }}>{view === "post" ? "Thank you for experiencing the game" : "Thank you for your responses"}</h2>
            {view === "pre" ? <p style={{ fontSize: 15, color: P.mut, lineHeight: 1.8, maxWidth: 400, margin: "0 auto 20px" }}>The pre-experience survey is complete. Your data has been recorded successfully.</p> : <div style={{ textAlign: "left", margin: "0 auto 28px" }}>
              <p style={{ fontSize: 15, color: P.mut, lineHeight: 1.8, marginBottom: 20 }}>Thank you for experiencing "What do you choose? - Loss and the value of life experienced through games."</p>
              <p style={{ fontSize: 14, color: P.mut, lineHeight: 1.9, marginBottom: 20 }}>We hope that this experience supports your health and happiness, and contributes to a more fulfilling life.</p>
              <div style={{ borderTop: `1px solid ${P.bdr}`, margin: "0 0 20px" }}></div>
              <p style={{ fontSize: 14, color: P.mut, lineHeight: 1.9, marginBottom: 16 }}>For those who have completed the game experience, we have provided an opportunity to freely enjoy the other game as well. You can experience each game from the URLs below.</p>
              <div style={{ background: "rgba(91,138,240,0.08)", border: `1.5px solid rgba(91,138,240,0.2)`, borderRadius: 10, padding: "18px 20px", marginBottom: 16 }}>
                <p style={{ fontSize: 14, color: "rgba(255,255,255,0.9)", fontWeight: 700, marginBottom: 8 }}>■ Straying (Novel Game)</p>
                <a href="https://solventer.jp/straying" target="_blank" rel="noopener" style={{ fontSize: 13, color: P.pri, wordBreak: "break-all" }}>https://solventer.jp/straying</a>
                <p style={{ fontSize: 14, color: "rgba(255,255,255,0.9)", fontWeight: 700, marginTop: 16, marginBottom: 8 }}>■ Dice of Destiny (Dice Game)</p>
                <a href="https://sunaonahito.github.io/dice-of-destiny-online3" target="_blank" rel="noopener" style={{ fontSize: 13, color: P.pri, wordBreak: "break-all" }}>https://sunaonahito.github.io/dice-of-destiny-online3</a>
              </div>
              <div style={{ background: "rgba(255,255,255,0.04)", border: `1.5px solid ${P.bdr}`, borderRadius: 10, padding: "18px 20px", marginBottom: 20 }}>
                <p style={{ fontSize: 13, color: P.mut, fontWeight: 600, marginBottom: 10 }}>Other: You can also experience the following versions:</p>
                <p style={{ fontSize: 13, color: P.mut, marginBottom: 4 }}>■ Dice of Destiny (8bit ver.)</p>
                <a href="https://sunaonahito.github.io/dice-of-destiny-online2" target="_blank" rel="noopener" style={{ fontSize: 12, color: P.pri, wordBreak: "break-all" }}>https://sunaonahito.github.io/dice-of-destiny-online2</a>
                <p style={{ fontSize: 13, color: P.mut, marginTop: 12, marginBottom: 4 }}>■ Dice of Destiny (English ver.)</p>
                <a href="https://emergence-japan.github.io/dice-of-destiny" target="_blank" rel="noopener" style={{ fontSize: 12, color: P.pri, wordBreak: "break-all" }}>https://emergence-japan.github.io/dice-of-destiny</a>
              </div>
              <p style={{ fontSize: 13, color: "rgba(255,255,255,0.5)", lineHeight: 1.7 }}>We do not collect game data for these versions. We hope you enjoy playing them when your time permits.</p>
            </div>}
            <div>{view === "post" ? <a href="https://sunaonahito.github.io/Informed-consent/index_en.html" style={{ display: "inline-block", padding: "12px 32px", background: "transparent", color: P.pri, border: `2px solid ${P.pri}`, borderRadius: 8, fontSize: 14, cursor: "pointer", fontWeight: 600, transition: "all 0.2s", textDecoration: "none" }}
              onMouseEnter={e => { e.target.style.background = P.pri; e.target.style.color = "#fff" }} onMouseLeave={e => { e.target.style.background = "transparent"; e.target.style.color = P.pri }}>Back to Top</a> : <button onClick={reset} style={{ padding: "12px 32px", background: "transparent", color: P.pri, border: `2px solid ${P.pri}`, borderRadius: 8, fontSize: 14, cursor: "pointer", fontWeight: 600, transition: "all 0.2s" }}
              onMouseEnter={e => { e.target.style.background = P.pri; e.target.style.color = "#fff" }} onMouseLeave={e => { e.target.style.background = "transparent"; e.target.style.color = P.pri }}>Back to Top</button>}</div>
          </div>
        </div>
      </div>;

      // FORM VIEW
      const isPre = view === "pre"; const total = tot(); const answered = cnt(); const missing = errs ? miss() : [];
      const missingCount = missing.length;
      const showErrBanner = errs === true && missingCount > 0;
      return <div style={{ minHeight: "100vh", background: "transparent" }}>
        <div style={{ maxWidth: 720, margin: "0 auto", padding: "0 20px 60px" }}>
          <Bar cur={answered} tot={total} />
          <div style={{ padding: "28px 0 20px", borderBottom: `1px solid ${P.bdr}`, marginBottom: 28 }}>
            <button onClick={() => { if (window.confirm("Your responses will not be saved. Go back to top?")) reset() }} style={{ background: "none", border: "none", color: P.mut, cursor: "pointer", fontSize: 13, padding: 0, marginBottom: 12, display: "flex", alignItems: "center", gap: 4 }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M15 18l-6-6 6-6" /></svg>Back to Top
            </button>
            <h1 style={{ fontFamily: "'Noto Sans JP',sans-serif", fontSize: 22, color: "rgba(255,255,255,0.85)", margin: 0, fontWeight: 500 }}>{isPre ? "Pre-experience Survey" : "Post-experience Survey"}</h1>
          </div>

          {showErrBanner && <div style={{ background: "rgba(240,112,112,0.12)", border: "1px solid rgba(240,112,112,0.3)", borderRadius: 10, padding: "14px 20px", marginBottom: 24 }}>
            <p style={{ fontSize: 14, color: P.err, margin: 0 }}>There are unanswered mandatory items. Please check the fields marked with a red warning.</p>
          </div>}

          {isPre ? (
            <div>
              <div style={{ marginBottom: 32 }}>
                <div style={{ background: "linear-gradient(90deg,#1E3A6E,#2B5EA7)", color: "#fff", padding: "16px 24px", borderRadius: "10px 10px 0 0", fontFamily: "'Noto Serif JP',serif" }}><h2 style={{ margin: 0, fontSize: 17, fontWeight: 600 }}>Basic Information</h2></div>
                <div style={{ background: P.card, border: `1px solid ${P.bdr}`, borderTop: "none", borderRadius: "0 0 10px 10px", padding: "24px" }}>
                  {PRE.demo.map(q => {
                    const hasErr = missing.includes(q.id);
                    return <div key={q.id} id={`f-${q.id}`} style={{ border: hasErr ? `1.5px solid ${P.err}` : "none", padding: hasErr ? 16 : 0, borderRadius: 8, background: hasErr ? "rgba(240,112,112,0.06)" : "transparent", marginBottom: 12 }}>
                      {hasErr && <p style={{ fontSize: 12, color: P.err, fontWeight: 600, marginBottom: 8 }}>⚠ This field is mandatory.</p>}
                      <DQ q={q} value={ans[q.id]} onChange={v => sa(q.id, v)} ov={oth[q.id]} onOv={v => so(q.id, v)} />
                    </div>
                  })}
                </div>
              </div>
              <SS section={PRE.swls} storageKey="pre_swls_order" answers={ans} set={sa} />
              <SS section={PRE.cses} storageKey="pre_cses_order" answers={ans} set={sa} />
              <SS section={PRE.srgs} storageKey="pre_srgs_order" answers={ans} set={sa} />
              <SS section={PRE.sig} storageKey="pre_sig_order" answers={ans} set={sa} />
              <SS section={PRE.apts} storageKey="pre_apts_order" answers={ans} set={sa} />
            </div>
          ) : (
            <div>
              <div style={{ marginBottom: 32 }}>
                <div style={{ background: "linear-gradient(90deg,#1E3A6E,#2B5EA7)", color: "#fff", padding: "16px 24px", borderRadius: "10px 10px 0 0", fontFamily: "'Noto Serif JP',serif" }}><h2 style={{ margin: 0, fontSize: 17, fontWeight: 600 }}>Anonymous Code</h2></div>
                <div style={{ background: P.card, border: `1px solid ${P.bdr}`, borderTop: "none", borderRadius: "0 0 10px 10px", padding: "24px" }}>
                  {POST.code.map(q => {
                    const hasErr = missing.includes(q.id);
                    return <div key={q.id} id={`f-${q.id}`} style={{ border: hasErr ? `1.5px solid ${P.err}` : "none", padding: hasErr ? 16 : 0, borderRadius: 8, background: hasErr ? "rgba(240,112,112,0.06)" : "transparent", marginBottom: 12 }}>
                      {hasErr && <p style={{ fontSize: 12, color: P.err, fontWeight: 600, marginBottom: 8 }}>⚠ This field is mandatory.</p>}
                      <DQ q={q} value={ans[q.id]} onChange={v => sa(q.id, v)} />
                    </div>
                  })}
                </div>
              </div>
              <SS section={POST.swls} storageKey="post_swls_order" answers={ans} set={sa} />
              <SS section={POST.cses} storageKey="post_cses_order" answers={ans} set={sa} />
              <SS section={POST.srgs} storageKey="post_srgs_order" answers={ans} set={sa} />
              <SS section={POST.sig} storageKey="post_sig_order" answers={ans} set={sa} />
              <SS section={POST.emot} storageKey="post_emot_order" answers={ans} set={sa} />
              <SS section={POST.refl} storageKey="post_refl_order" answers={ans} set={sa} />

              <div style={{ marginBottom: 32 }}>
                <div style={{ background: "linear-gradient(90deg,#1E3A6E,#2B5EA7)", color: "#fff", padding: "16px 24px", borderRadius: "10px 10px 0 0", fontFamily: "'Noto Serif JP',serif" }}><h2 style={{ margin: 0, fontSize: 17, fontWeight: 600 }}>Game Playing Habits</h2></div>
                <div style={{ background: P.card, border: `1px solid ${P.bdr}`, borderTop: "none", borderRadius: "0 0 10px 10px", padding: "24px" }}>
                  {POST.gameHabits.map((q, idx) => <DQ key={q.id} q={q} value={ans[q.id]} onChange={v => sa(q.id, v)} displayNum={idx + 1} />)}
                </div>
              </div>

              <div style={{ marginBottom: 32 }}>
                <div style={{ background: "linear-gradient(90deg,#1E3A6E,#2B5EA7)", color: "#fff", padding: "16px 24px", borderRadius: "10px 10px 0 0", fontFamily: "'Noto Serif JP',serif" }}><h2 style={{ margin: 0, fontSize: 17, fontWeight: 600 }}>Feedback</h2></div>
                <div style={{ background: P.card, border: `1px solid ${P.bdr}`, borderTop: "none", borderRadius: "0 0 10px 10px", padding: "24px" }}>
                  {POST.open.map(q => <DQ key={q.id} q={q} value={ans[q.id]} onChange={v => sa(q.id, v)} />)}
                </div>
              </div>
            </div>
          )}

          <div style={{ display: "flex", gap: 16, justifyContent: "flex-end", borderTop: `1px solid ${P.bdr}`, paddingTop: 28 }}>
            <button onClick={() => { if (window.confirm("Your responses will not be saved. Go back to top?")) reset() }} style={{ padding: "12px 24px", background: "transparent", border: `1.5px solid ${P.bdr}`, borderRadius: 8, color: P.mut, fontSize: 14, cursor: "pointer", transition: "all 0.2s" }}
              onMouseEnter={e => e.target.style.color = P.txt} onMouseLeave={e => e.target.style.color = P.mut}>Cancel</button>
            <button onClick={submit} style={{ padding: "12px 32px", background: `linear-gradient(135deg,${P.pri},${P.priL})`, border: "none", borderRadius: 8, color: "#fff", fontSize: 14, fontWeight: 600, cursor: "pointer", boxShadow: "0 4px 12px rgba(91,138,240,0.2)", transition: "all 0.2s" }}
              onMouseEnter={e => { e.target.style.boxShadow = "0 6px 18px rgba(91,138,240,0.4)"; e.target.style.transform = "translateY(-1px)" }} onMouseLeave={e => { e.target.style.boxShadow = "0 4px 12px rgba(91,138,240,0.2)"; e.target.style.transform = "none" }}>Submit Responses</button>
          </div>
        </div>
      </div>;
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>

</html>
